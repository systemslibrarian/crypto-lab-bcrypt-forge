<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="bcrypt Forge — Interactive Password Hashing Deep Dive">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1117"/>
      <stop offset="1" stop-color="#161b27"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#2a3550" stroke-width="2" rx="0"/>

  <text x="80" y="150" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="30" font-weight="700" letter-spacing="6" fill="#7c5cbf">PASSWORD HASHING · CRYPTO-LAB</text>

  <text x="78" y="270" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="104" font-weight="800" fill="#e6eaf4">bcrypt Forge</text>

  <text x="80" y="340" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="38" font-weight="400" fill="#a0aec0">An interactive, browser-based deep dive — real hashes, no simulation.</text>

  <!-- Annotated hash motif -->
  <g font-family="Cascadia Code, Consolas, monospace" font-size="40" font-weight="700">
    <rect x="80" y="420" width="1040" height="90" rx="12" fill="#1a2030" stroke="#2a3550"/>
    <text x="108" y="478" fill="#4a9eff">$2b$</text>
    <text x="208" y="478" fill="#f59e0b">12$</text>
    <text x="288" y="478" fill="#22c55e">R9h/cIPz0gi.URNNX3kh2O</text>
    <text x="760" y="478" fill="#a855f7">PST9/PgBkqquzi.Ss7KIUgO2t0jWMUW</text>
  </g>

  <g font-family="system-ui, sans-serif" font-size="26" font-weight="600">
    <text x="120" y="560" fill="#4a9eff">version</text>
    <text x="226" y="560" fill="#f59e0b">cost</text>
    <text x="430" y="560" fill="#22c55e">salt</text>
    <text x="900" y="560" fill="#a855f7">hash</text>
